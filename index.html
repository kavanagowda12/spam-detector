<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpamShield – Email Spam Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Reset & Variables ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --border:    #1e2230;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --accent:    #00e5a0;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --safe:      #00e5a0;
      --card-r:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── Grid noise overlay ─────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,160,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,160,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 48px;
      position: relative; z-index: 1;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #00e5a020, #00e5a008);
      border: 1px solid #00e5a030;
      border-radius: 50px;
      padding: 6px 18px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .logo-badge::before {
      content: '◉';
      animation: blink 1.8s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-size: clamp(2.4rem, 6vw, 3.8rem);
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1.05;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      margin-top: 12px;
      font-size: 1rem;
      font-weight: 300;
    }

    /* ── Main card ──────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-r);
      padding: 36px;
      width: 100%;
      max-width: 680px;
      position: relative; z-index: 1;
      box-shadow: 0 0 60px rgba(0,229,160,.04);
    }

    /* ── Form elements ──────────────────────────────────── */
    label {
      display: block;
      font-size: .78rem;
      font-family: 'Space Mono', monospace;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus { border-color: var(--accent); }

    .field { margin-bottom: 20px; }

    textarea { min-height: 140px; }

    /* ── Button ─────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Spinner ─────────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #00000040;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result panel ────────────────────────────────────── */
    #result {
      margin-top: 28px;
      display: none;
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .verdict-banner {
      border-radius: 10px;
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .verdict-banner.SPAM        { background:#ef444415; border:1px solid #ef444440; }
    .verdict-banner.SUSPICIOUS  { background:#f59e0b15; border:1px solid #f59e0b40; }
    .verdict-banner.LEGITIMATE  { background:#00e5a015; border:1px solid #00e5a040; }

    .verdict-icon { font-size: 2.4rem; line-height: 1; }

    .verdict-label {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .SPAM       .verdict-label { color: var(--danger); }
    .SUSPICIOUS .verdict-label { color: var(--warn);   }
    .LEGITIMATE .verdict-label { color: var(--safe);   }

    .verdict-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Score bar ──────────────────────────────────────── */
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .score-label {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-num {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .bar-track {
      background: var(--border);
      border-radius: 50px;
      height: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 50px;
      transition: width 1s cubic-bezier(.25,1,.5,1);
      width: 0;
    }

    /* ── Reasons list ────────────────────────────────────── */
    .reasons-title {
      font-family: 'Space Mono', monospace;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .reasons-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reasons-list li {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 14px;
      font-size: .84rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reasons-list li::before {
      content: '⚑';
      color: var(--warn);
      font-size: .9rem;
      flex-shrink: 0;
    }

    .no-reasons {
      font-size: .88rem;
      color: var(--muted);
      padding: 12px 0;
      font-style: italic;
    }

    /* ── Error ──────────────────────────────────────────── */
    #error-msg {
      display: none;
      background: #ef444415;
      border: 1px solid #ef444440;
      border-radius: 8px;
      padding: 14px 18px;
      color: var(--danger);
      font-size: .88rem;
      margin-top: 16px;
    }

    /* ── Footer ─────────────────────────────────────────── */
    footer {
      margin-top: 40px;
      color: var(--muted);
      font-size: .78rem;
      font-family: 'Space Mono', monospace;
      text-align: center;
      position: relative; z-index: 1;
      letter-spacing: .5px;
    }

    /* ── Sample buttons ─────────────────────────────────── */
    .samples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .sample-btn {
      font-size: .75rem;
      font-family: 'Space Mono', monospace;
      padding: 5px 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }

    .sample-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 24px;
    }

    @media (max-width: 520px) {
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-badge">SpamShield v1.0</div>
    <h1>Email <span>Spam</span><br>Detector</h1>
    <p class="subtitle">Paste any email — our API will analyse it instantly.</p>
  </header>

  <div class="card">

    <!-- Quick sample buttons -->
    <p style="font-size:.78rem;font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Try a sample →</p>
    <div class="samples">
      <button class="sample-btn" onclick="loadSample('spam')">🚫 Spam sample</button>
      <button class="sample-btn" onclick="loadSample('legit')">✅ Legit sample</button>
      <button class="sample-btn" onclick="loadSample('suspicious')">⚠️ Suspicious sample</button>
    </div>

    <hr class="divider"/>

    <!-- Form -->
    <div class="field">
      <label for="subject">Email Subject</label>
      <input type="text" id="subject" placeholder="Enter the email subject line…" />
    </div>

    <div class="field">
      <label for="body">Email Body</label>
      <textarea id="body" placeholder="Paste the full email body here…"></textarea>
    </div>

    <button class="btn" id="analyzeBtn" onclick="analyzeEmail()">
      <span id="btn-text">ANALYZE EMAIL</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div id="error-msg"></div>

    <!-- Result -->
    <div id="result">
      <div class="verdict-banner" id="verdict-banner">
        <div class="verdict-icon" id="verdict-icon"></div>
        <div>
          <div class="verdict-label" id="verdict-label"></div>
          <div class="verdict-sub"  id="verdict-sub"></div>
        </div>
      </div>

      <div class="score-row">
        <span class="score-label">Spam Score</span>
        <span class="score-num" id="score-num">0 / 100</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill"></div>
      </div>

      <p class="reasons-title">Reasons detected</p>
      <ul class="reasons-list" id="reasons-list"></ul>
    </div>

  </div>

  <footer>Built for Hackathon 2025 · Flask + Vanilla JS · SpamShield API</footer>

  <script>
    const API = "http://localhost:5000/api/check";   // ← backend URL

    const SAMPLES = {
      spam: {
        subject: "🎉 CONGRATULATIONS!! You've WON $1,000,000 — CLAIM NOW!!!",
        body: `Dear Friend,\n\nYou have been SELECTED as our WINNER! Click here to claim your FREE prize of $1,000,000.\n\nThis is a LIMITED TIME offer — ACT NOW before it expires!\n\nNo credit card required. 100% Guaranteed. Risk-free!\n\nClick the link below to verify your bank account and wire transfer details:\nhttps://totally-legit-prize.xyz/claim\n\nCongratulations again!\nDear Nigerian Prince`
      },
      legit: {
        subject: "Team standup notes – Thursday April 30",
        body: `Hi everyone,\n\nHere are the notes from today's standup meeting:\n\n- Alice is finishing the authentication module, should be done by Friday.\n- Bob is reviewing pull requests from the sprint.\n- Carol is working on the design mockups for the new dashboard.\n\nNext standup is Monday at 10am. Let me know if you have any questions.\n\nBest,\nSam`
      },
      suspicious: {
        subject: "Exclusive discount – 70% OFF today only",
        body: `Hi there,\n\nWe noticed your account and want to offer you an exclusive deal.\n\nGet 70% OFF all products — today ONLY!\n\nClick here to unlock your discount: https://deals.example.com/offer\n\nDon't miss out. Offer expires at midnight.\n\nThe Deals Team`
      }
    };

    function loadSample(type) {
      document.getElementById("subject").value = SAMPLES[type].subject;
      document.getElementById("body").value    = SAMPLES[type].body;
      document.getElementById("result").style.display = "none";
      document.getElementById("error-msg").style.display = "none";
    }

    async function analyzeEmail() {
      const subject = document.getElementById("subject").value.trim();
      const body    = document.getElementById("body").value.trim();
      const btn     = document.getElementById("analyzeBtn");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btn-text");
      const errDiv  = document.getElementById("error-msg");
      const result  = document.getElementById("result");

      errDiv.style.display  = "none";
      result.style.display  = "none";

      if (!subject && !body) {
        showError("Please enter a subject or body before analysing.");
        return;
      }

      // Loading state
      btn.disabled      = true;
      spinner.style.display = "block";
      btnText.textContent   = "ANALYSING…";

      try {
        const res = await fetch(API, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify({ subject, body })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || "Server error");
        }

        const data = await res.json();
        renderResult(data);

      } catch (err) {
        if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
          showError("⚠️ Cannot reach the backend. Make sure the Flask server is running on localhost:5000.\n\nRun: python app.py");
        } else {
          showError("Error: " + err.message);
        }
      } finally {
        btn.disabled          = false;
        spinner.style.display = "none";
        btnText.textContent   = "ANALYZE EMAIL";
      }
    }

    function renderResult(data) {
      const { verdict, score, confidence, reasons } = data;

      // Banner
      const banner = document.getElementById("verdict-banner");
      banner.className = "verdict-banner " + verdict;

      const icons = { SPAM: "🚫", SUSPICIOUS: "⚠️", LEGITIMATE: "✅" };
      document.getElementById("verdict-icon").textContent = icons[verdict] || "❓";
      document.getElementById("verdict-label").textContent = verdict;
      document.getElementById("verdict-sub").textContent =
        `Confidence: ${confidence} · Spam score: ${score}/100`;

      // Score bar
      document.getElementById("score-num").textContent = `${score} / 100`;
      const fill = document.getElementById("bar-fill");
      const colors = { SPAM: "#ef4444", SUSPICIOUS: "#f59e0b", LEGITIMATE: "#00e5a0" };
      fill.style.background = colors[verdict];
      fill.style.width = "0";
      setTimeout(() => { fill.style.width = score + "%"; }, 50);

      // Reasons
      const list = document.getElementById("reasons-list");
      list.innerHTML = "";
      if (reasons.length === 0) {
        list.innerHTML = '<p class="no-reasons">No suspicious signals found — looks clean!</p>';
      } else {
        reasons.forEach(r => {
          const li = document.createElement("li");
          li.textContent = r;
          list.appendChild(li);
        });
      }

      // Show
      const resultEl = document.getElementById("result");
      resultEl.style.display = "block";
      resultEl.style.animation = "none";
      resultEl.offsetHeight;  // reflow
      resultEl.style.animation = "";
    }

    function showError(msg) {
      const el = document.getElementById("error-msg");
      el.textContent = msg;
      el.style.display = "block";
    }
  </script>
</body>
</html>
